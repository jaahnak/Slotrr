name: Generate Android Keystore

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Key alias'
        required: true
        default: 'gitdeck'
      store_password:
        description: 'Keystore password (save this!)'
        required: true
        default: 'GitDeck2024'
      key_password:
        description: 'Key password (save this!)'
        required: true
        default: 'GitDeck2024'

jobs:
  generate-keystore:
    runs-on: ubuntu-latest

    steps:
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias "${{ github.event.inputs.alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore gitdeck.jks \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=GitDeck, OU=Development, O=GitDeck, L=India, S=India, C=IN" \
            -noprompt

      - name: Verify Keystore
        run: |
          keytool -list \
            -keystore gitdeck.jks \
            -storepass "${{ github.event.inputs.store_password }}" \
            -v

      - name: Print Base64 Keystore
        run: |
          echo "=================================================="
          echo "COPY EVERYTHING BETWEEN THE LINES BELOW"
          echo "=================================================="
          echo ""
          echo "=== ANDROID_KEYSTORE_BASE64 ==="
          base64 -w 0 gitdeck.jks
          echo ""
          echo ""
          echo "=== ANDROID_KEY_ALIAS ==="
          echo "${{ github.event.inputs.alias }}"
          echo ""
          echo "=== ANDROID_KEYSTORE_PASSWORD ==="
          echo "${{ github.event.inputs.store_password }}"
          echo ""
          echo "=== ANDROID_KEY_PASSWORD ==="
          echo "${{ github.event.inputs.key_password }}"
          echo ""
          echo "=================================================="
          echo "Copy all 4 values above into GitHub Secrets"
          echo "=================================================="

      - name: Upload Keystore as Artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: gitdeck-keystore-BACKUP
          path: gitdeck.jks
          retention-days: 1
